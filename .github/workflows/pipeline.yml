name: Tourism MLOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    env:
      HFTOKEN: ${{ secrets.HFTOKEN }}
      HFDATASETREPOID: nittygritty2106/travel-prediction-dataset
      HFMODELREPOID: nittygritty2106/travelpredictionmlops
      HFSPACEREPOID: nittygritty2106/travelpredictionmlops-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training pipeline
        run: |
          python train.py

      - name: Deploy app to Hugging Face Space
        run: |
          python deploytohfspace.py
